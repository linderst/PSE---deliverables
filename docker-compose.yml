services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./src/backend/database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
      dockerfile: ../../docker/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_KEY:-masterKey}
    volumes:
      - ./src/backend:/app
      - model_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started

  frontend:
    build:
      context: ./src/frontend
      dockerfile: ../../docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - backend

  importer:
    build:
      context: ./src/backend
      dockerfile: ../../docker/backend/Dockerfile
    command: python import_icd.py
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DATA_DIR: /app/data
    volumes:
      - ./src/backend:/app
      - ./data:/app/data
      - model_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - import

  meili-importer:
    build:
      context: ./src/backend
      dockerfile: ../../docker/backend/Dockerfile
    command: python import_meili.py
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_KEY:-masterKey}
    volumes:
      - ./src/backend:/app
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
    profiles:
      - import

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-masterKey}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data

volumes:
  db_data:
  model_cache:
  frontend_modules:
  meili_data:
